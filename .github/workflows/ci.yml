name: CI

# Workflow stack-agnóstico: lê comandos do .dev-autonomo.yml e executa.
#
# Inclui services Docker para o step `test` (Postgres + Qdrant + RabbitMQ +
# Redis) — testes de integração precisam disso. Para clientes com stack
# diferente, os services podem ser ajustados conforme o yml declarar
# (futuro: workflow lê `sandbox.services` do yml e provisiona dinamicamente).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dev_autonomo
          POSTGRES_PASSWORD: ci_test_pwd
          POSTGRES_DB: dev_autonomo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev_autonomo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: dev_autonomo
          RABBITMQ_DEFAULT_PASS: ci_test_pwd
        ports:
          - 5672:5672

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      # Conexão com services do job (postgres/qdrant/rabbitmq/redis ficam no
      # mesmo network — acessíveis via localhost da view do runner)
      POSTGRES_USER: dev_autonomo
      POSTGRES_PASSWORD: ci_test_pwd
      POSTGRES_DB: dev_autonomo
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      RABBITMQ_USER: dev_autonomo
      RABBITMQ_PASSWORD: ci_test_pwd
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: 5672
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      QDRANT_HOST: localhost
      QDRANT_PORT: 6333
      # API keys fake — testes de integração que batem em Anthropic/Voyage
      # devem ser marcados com @pytest.mark.requires_external e skippados
      # no CI até termos secret real configurado.
      ANTHROPIC_API_KEY: "sk-ant-ci-fake"
      VOYAGE_API_KEY: "voyage-ci-fake"
      MASTER_ENCRYPTION_KEY: "JEqMyDsbQwbT4-7Rl0CB-rkrWfdM7l0t5VgGOObhrTM="
      SECRET_KEY: "ci-test-secret-key-not-for-prod"
      ENVIRONMENT: "local"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (parser do .dev-autonomo.yml)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar PyYAML
        run: pip install pyyaml

      - name: Lê .dev-autonomo.yml
        id: descriptor
        run: |
          if [ ! -f .dev-autonomo.yml ]; then
            echo "::error::.dev-autonomo.yml não encontrado na raiz."
            exit 1
          fi
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import yaml
          d = yaml.safe_load(open('.dev-autonomo.yml'))
          stack = d.get('stack', '')
          cmds = d.get('commands') or {}
          print(f"stack={stack}")
          for k in ('install', 'lint', 'typecheck', 'build', 'test'):
              v = (cmds.get(k) or '').strip()
              if '\n' in v:
                  print(f"{k}<<EOF_CMD_{k}")
                  print(v)
                  print(f"EOF_CMD_{k}")
              else:
                  print(f"{k}={v}")
          PY

      # ---- Setup de runtime por stack ----

      - name: Setup uv (stack=python*)
        if: startsWith(steps.descriptor.outputs.stack, 'python')
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # ---- Execução dos checks ----

      - name: install
        if: steps.descriptor.outputs.install != ''
        run: |
          echo "+ ${{ steps.descriptor.outputs.install }}"
          ${{ steps.descriptor.outputs.install }}

      - name: lint
        if: steps.descriptor.outputs.lint != ''
        run: |
          echo "+ ${{ steps.descriptor.outputs.lint }}"
          ${{ steps.descriptor.outputs.lint }}

      - name: typecheck
        if: steps.descriptor.outputs.typecheck != ''
        run: |
          echo "+ ${{ steps.descriptor.outputs.typecheck }}"
          ${{ steps.descriptor.outputs.typecheck }}

      - name: build
        if: steps.descriptor.outputs.build != ''
        run: |
          echo "+ ${{ steps.descriptor.outputs.build }}"
          ${{ steps.descriptor.outputs.build }}

      # alembic migration antes dos testes (precisa do Postgres já up)
      - name: db migrate (alembic upgrade head)
        if: steps.descriptor.outputs.test != ''
        run: |
          echo "+ uv run alembic upgrade head"
          uv run alembic upgrade head

      - name: test
        if: steps.descriptor.outputs.test != ''
        run: |
          echo "+ ${{ steps.descriptor.outputs.test }}"
          ${{ steps.descriptor.outputs.test }}
