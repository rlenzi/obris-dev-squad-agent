name: CI

# Workflow stack-agnóstico: lê os comandos do .dev-autonomo.yml na raiz e
# executa cada check declarado. O setup do runtime (Python/Node/etc) é
# inferido pelo campo `stack` do yml.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (parser do .dev-autonomo.yml)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar PyYAML
        run: pip install pyyaml

      - name: Lê .dev-autonomo.yml
        id: descriptor
        run: |
          if [ ! -f .dev-autonomo.yml ]; then
            echo "::error::.dev-autonomo.yml não encontrado na raiz."
            exit 1
          fi
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import yaml
          d = yaml.safe_load(open('.dev-autonomo.yml'))
          stack = d.get('stack', '')
          cmds = d.get('commands') or {}
          print(f"stack={stack}")
          for k in ('install', 'lint', 'typecheck', 'build', 'test'):
              v = (cmds.get(k) or '').strip()
              # GitHub Actions outputs com newline precisam de heredoc
              if '\n' in v:
                  print(f"{k}<<EOF_CMD_{k}")
                  print(v)
                  print(f"EOF_CMD_{k}")
              else:
                  print(f"{k}={v}")
          PY
          echo "::notice::Stack declarado: $(grep '^stack=' "$GITHUB_OUTPUT" | tail -1)"

      # ---- Setup de runtime por stack ----
      # Adicione novos casos aqui conforme cliente com stack novo entrar.

      - name: Setup uv (stack=python*)
        if: startsWith(steps.descriptor.outputs.stack, 'python')
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # TODO: setup-node@v4 quando entrar primeiro cliente node+*
      # TODO: setup-java@v4 quando entrar primeiro cliente java+*

      # ---- Execução dos checks (genérico) ----

      - name: install
        if: steps.descriptor.outputs.install != ''
        run: |
          echo "+ ${{ steps.descriptor.outputs.install }}"
          ${{ steps.descriptor.outputs.install }}

      - name: lint
        if: steps.descriptor.outputs.lint != ''
        run: |
          echo "+ ${{ steps.descriptor.outputs.lint }}"
          ${{ steps.descriptor.outputs.lint }}

      - name: typecheck
        if: steps.descriptor.outputs.typecheck != ''
        run: |
          echo "+ ${{ steps.descriptor.outputs.typecheck }}"
          ${{ steps.descriptor.outputs.typecheck }}

      - name: build
        if: steps.descriptor.outputs.build != ''
        run: |
          echo "+ ${{ steps.descriptor.outputs.build }}"
          ${{ steps.descriptor.outputs.build }}

      - name: test
        if: steps.descriptor.outputs.test != ''
        run: |
          echo "+ ${{ steps.descriptor.outputs.test }}"
          ${{ steps.descriptor.outputs.test }}
